name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Recent activity (7 days)
      - name: Recent Activity (7 days)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: CoderMageFox
          filename: metrics-recent-7d.svg
          base: activity, community
          base_indepth: yes
          config_timezone: Asia/Shanghai
          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 7
          plugin_activity_filter: commit, pr, issue, comment
          plugin_habits: yes
          plugin_habits_from: 50
          plugin_habits_days: 7
          plugin_habits_charts: yes

      # Monthly activity (30 days)
      - name: Monthly Activity (30 days)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: CoderMageFox
          filename: metrics-recent-30d.svg
          base: activity, community
          base_indepth: yes
          config_timezone: Asia/Shanghai
          plugin_activity: yes
          plugin_activity_limit: 15
          plugin_activity_days: 30
          plugin_activity_filter: commit, pr, issue, comment
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_charts: yes

      # Coding habits & languages
      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: CoderMageFox
          filename: metrics-habits.svg
          base: ""
          config_timezone: Asia/Shanghai
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 30
          plugin_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
